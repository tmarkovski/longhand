<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>longhand</title>
    <meta name="description" content="Type text, watch it written by a neural pen. Handwriting, alive." />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✍️</text></svg>"
    />
  </head>
  <body>
    <!-- Apply the saved theme before first paint so the page never flashes
         the wrong scheme. Kept inline and tiny; the toggle lives in React. -->
    <script>
      try {
        var theme = localStorage.getItem("theme");
        if (
          theme === "dark" ||
          (theme !== "light" && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      } catch (ignored) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
