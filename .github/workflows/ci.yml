name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # macOS runner because asset generation imports mlx (Apple-silicon
    # native); free for public repos.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: tools/uv.lock

      - name: Generate model assets and golden vectors
        working-directory: tools
        run: |
          uv sync
          uv run python export_weights.py
          uv run python make_goldens.py --cpu

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test
