name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # mlx ships manylinux wheels (CPU backend), and asset generation runs
    # with --cpu, so a Linux runner works fine.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # setup-uv no longer publishes major tags (v8+); pin the exact version.
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: tools/uv.lock

      # Model weights are committed package assets; generated here are the
      # golden vectors and the gitignored f32 fixture the golden tests read
      # (MLX parity tolerances only hold for unquantized weights). Both come
      # fresh from the MLX reference, and the drift tests compare the
      # committed q8 asset against the fixture, so weights that no longer
      # match the submodule still fail the build.
      - name: Generate golden vectors and the f32 fixture
        working-directory: tools
        run: |
          uv sync
          uv run python make_goldens.py --cpu
          uv run python export_weights.py --fixture-only

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test
