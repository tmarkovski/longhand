name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # mlx ships manylinux wheels (CPU backend), and asset generation runs
    # with --cpu, so a Linux runner works fine.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # setup-uv no longer publishes major tags (v8+); pin the exact version.
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: tools/uv.lock

      - name: Generate model assets and golden vectors
        working-directory: tools
        run: |
          uv sync
          uv run python export_weights.py
          uv run python make_goldens.py --cpu

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test
